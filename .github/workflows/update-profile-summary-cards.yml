name: Update profile summary cards

on:
  schedule:
    - cron: "17 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cards:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update summary card SVGs
        run: python3 .github/scripts/update_profile_summary_cards.py

      - name: Commit updated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add image/profile-summary-cards/*.svg
          if git diff --cached --quiet; then
            echo "No summary card changes to commit."
          else
            git commit -m "Update profile summary cards"
            git push
          fi
